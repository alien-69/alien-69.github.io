<div class="tiny my-3">
    <form>
        <!-- <div class="alert alert-info" role="alert">
            Give it a name. Voilà!
        </div> -->
        <div class="form-group row">
            <label class="col-sm-3 col-form-lable">Token name</label>
            <div class="col-sm-9">
                <input class="token_name" type="text" placeholder="" required />
                <p class="hint">Choose a name for your token.</p>
            </div>
        </div>

        <div class="form-group row">
            <label class="col-sm-3 col-form-lable">Total supply </label>
            <div class="col-sm-9">
                <input class="token_supply" type="number" min="1" step="1000" placeholder="1000000" />
                <p class="hint">
                    The total supply is limited to 1M tokens.
                </p>
            </div>
        </div>

    </form>

</div>
