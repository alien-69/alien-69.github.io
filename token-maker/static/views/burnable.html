<div class="burnable my-3">
    <form>
        <div class="form-group row">
            <label class="col-sm-3 col-form-lable">Token name</label>
            <div class="col-sm-9">
                <input class="token_name" type="text" placeholder="" required />
                <p class="hint">Choose a name for your token.</p>
            </div>
        </div>

        <div class="form-group row">
            <label class="col-sm-3 col-form-lable">Token symbol </label>
            <div class="col-sm-9">
                <input class="token_symbol" type="text" placeholder="" />
                <p class="hint">
                    Choose a symbol for your token (usually 3-5 chars).
                </p>
            </div>
        </div>

        <div class="form-group row">
            <label class="col-sm-3 col-form-lable">Total supply </label>
            <div class="col-sm-9">
                <input class="token_supply" type="number" min="1" step="100000" placeholder="1000000000000" />
                <p class="hint">
                    Insert the initial number of tokens available. Will be
                    put in your account.
                </p>
            </div>
        </div>

        <div class="form-group row">
            <label class="col-sm-3 col-form-lable">Decimals </label>
            <div class="col-sm-9">
                <input disabled class="decimals" type="number" placeholder="18" />
                <p class="hint">
                    Insert the decimal precision of your token.
                </p>
            </div>
        </div>
    </form>
    <div class="row">
        <p><i class="fa-solid fa-square-check" style="color: blue;"></i> Can burn</p>
    </div>
</div>
